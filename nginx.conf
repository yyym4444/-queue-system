# =============================================================
#  Nginx 反向代理配置（可选 — 支持 80 端口 + WebSocket）
#  安装: apt-get install nginx
#  复制: cp nginx.conf /etc/nginx/sites-available/queue-system
#  启用: ln -s /etc/nginx/sites-available/queue-system /etc/nginx/sites-enabled/
#  测试: nginx -t && systemctl reload nginx
# =============================================================

upstream queue_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # 日志
    access_log /var/log/nginx/queue-access.log;
    error_log /var/log/nginx/queue-error.log;

    # 静态文件 — nginx 直接返回，不经过 Python
    location /style.css {
        root /opt/queue-system/public;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket
    location /ws {
        proxy_pass http://queue_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # 其余请求代理到 Python
    location / {
        proxy_pass http://queue_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 上传限制
    client_max_body_size 1m;
}
