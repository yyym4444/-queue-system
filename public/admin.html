<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>叫号管理</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ===== 手机优先：超大按钮、清晰状态 ===== */
    .ctrl-btn { padding: 18px 24px; font-size: 18px; border-radius: 16px; min-width: 90px; }
    .next-btn { font-size: 22px; padding: 20px 40px; }
    .admin-controls { gap: 16px; margin-top: 32px; }
    .quick-jump { margin-top: 24px; gap: 14px; }
    .quick-jump input { width: 140px; padding: 16px 20px; font-size: 18px; border-radius: 16px; }
    .jump-btn { padding: 16px 28px; font-size: 16px; }
    .admin .number-display { width: 160px; height: 160px; }
    .admin .number-display .number-text { font-size: 56px; }
    .admin-queue-name { font-size: 16px; margin-top: 16px; }
    .status-simple { text-align: center; font-size: 13px; color: #888; margin-top: 8px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <!-- ========== 登录遮罩 ========== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2 id="loginTitle">管理员登录</h2>
      <input type="password" id="passwordInput" placeholder="请输入管理密码" autofocus>
      <button id="loginBtn">登 录</button>
      <p class="login-hint" id="loginHint"></p>
    </div>
  </div>

  <!-- ========== 管理面板 ========== -->
  <div class="container admin" id="adminPanel" style="display:none">
    <header>
      <h1 id="adminCityName">--</h1>
      <p class="subtitle" id="adminStatus">加载中...</p>
    </header>

    <main>
      <div class="number-stage">
        <div class="number-display admin-number">
          <span class="number-text" id="adminNumberText">--</span>
        </div>
      </div>
      <div class="admin-queue-name" id="adminQueueName">--</div>

      <!-- 更新时间 -->
      <div class="update-time" id="updateTimeBlock">
        <span>最后更新：</span>
        <span id="updateTimeText">--</span>
      </div>

      <!-- 简单状态 — 手机用户只需要知道"能不能操作" -->
      <div class="status-simple" id="statusSimple"></div>

      <!-- 批量叫号 — 仅此功能 -->
      <div style="margin-top:28px;text-align:center;">
        <div style="display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;">
          <input type="number" id="rangeStart" placeholder="起始号" min="0" inputmode="numeric" pattern="[0-9]*" style="width:120px;padding:16px;font-size:18px;border:2px solid var(--pink-light);border-radius:16px;text-align:center;">
          <span style="font-size:22px;font-weight:bold;color:var(--black);">—</span>
          <input type="number" id="rangeEnd" placeholder="截止号" min="0" inputmode="numeric" pattern="[0-9]*" style="width:120px;padding:16px;font-size:18px;border:2px solid var(--pink-light);border-radius:16px;text-align:center;">
        </div>
        <button class="ctrl-btn next-btn" id="rangeBtn" style="margin-top:20px;width:100%;max-width:300px;font-size:20px;padding:18px;">确认叫号</button>
      </div>

      <!-- 当前区间提示 -->
      <div class="range-display" id="rangeInfo" style="margin-top:16px;display:none;">
        <span class="range-text" id="rangeInfoText" style="font-size:18px;font-weight:900;color:var(--red);background:var(--pink-lighter);padding:8px 24px;border-radius:12px;border:2px solid var(--pink-light);"></span>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const QUEUE_NAMES = { '1': '郑州', '2': '上海', '3': '成都', '4': '广州' };
      const STORAGE_KEY = 'qs_token_v2';  // localStorage key

      // 从 URL 获取队列
      const params = new URLSearchParams(location.search);
      let queueId = params.get('queue') || '1';
      if (!QUEUE_NAMES[queueId]) queueId = '1';
      const cityName = QUEUE_NAMES[queueId];

      // ===== DOM =====
      const loginTitle = document.getElementById('loginTitle');
      const loginOverlay = document.getElementById('loginOverlay');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const loginHint = document.getElementById('loginHint');
      const adminPanel = document.getElementById('adminPanel');
      const adminCityName = document.getElementById('adminCityName');
      const adminStatus = document.getElementById('adminStatus');
      const adminQueueName = document.getElementById('adminQueueName');
      const adminNumberText = document.getElementById('adminNumberText');
      const updateTimeText = document.getElementById('updateTimeText');
      const statusSimple = document.getElementById('statusSimple');
      const rangeStart = document.getElementById('rangeStart');
      const rangeEnd = document.getElementById('rangeEnd');
      const rangeBtn = document.getElementById('rangeBtn');
      const rangeInfo = document.getElementById('rangeInfo');
      const rangeInfoText = document.getElementById('rangeInfoText');

      // 设置城市名
      loginTitle.textContent = cityName + ' · 管理员登录';
      adminCityName.textContent = cityName;
      adminQueueName.textContent = cityName;
      passwordInput.placeholder = '请输入' + cityName + '管理密码';
      document.title = cityName + ' - 叫号管理';

      // ===== 状态 =====
      let adminToken = null;
      let savedPassword = null;
      let ws = null;
      let wsReady = false;
      let pollTimer = null;
      let lastCmdTime = 0;
      let curRangeStart = 0;
      let curRangeEnd = 0;

      // ===== 初始化：尝试从 localStorage 恢复登录 =====
      function tryRestore() {
        const saved = localStorage.getItem(STORAGE_KEY + '_' + queueId);
        if (!saved) return false;
        try {
          const data = JSON.parse(saved);
          if (data.token && data.password) {
            adminToken = data.token;
            savedPassword = data.password;
            loginOverlay.style.display = 'none';
            adminPanel.style.display = 'flex';
            adminStatus.textContent = cityName + ' · 已登录';
            adminStatus.style.color = '#27ae60';
            updateWebButtons(true);
            startPolling();
            startWebSocket();
            return true;
          }
        } catch(e) {}
        return false;
      }

      // 保存登录到 localStorage
      function saveLogin(token, pw) {
        localStorage.setItem(STORAGE_KEY + '_' + queueId, JSON.stringify({
          token: token, password: pw, time: Date.now()
        }));
      }

      // ===== 登录 =====
      function doLogin() {
        const pw = passwordInput.value.trim();
        if (!pw) return;
        loginHint.textContent = '验证中...';
        loginHint.style.color = '#888';

        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw, queue: queueId }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              adminToken = data.token;
              savedPassword = pw;
              saveLogin(data.token, pw);
              loginOverlay.style.display = 'none';
              adminPanel.style.display = 'flex';
              if (data.number !== undefined) {
                adminNumberText.textContent = data.number;
                updateTimestamp(data.last_updated);
              }
              adminStatus.textContent = cityName + ' · 已登录';
              adminStatus.style.color = '#27ae60';
              updateWebButtons(true);
              startPolling();
              startWebSocket();
            } else {
              loginHint.textContent = data.error || '密码错误';
              loginHint.style.color = '#e74c3c';
              passwordInput.value = '';
              passwordInput.focus();
            }
          })
          .catch(() => {
            loginHint.textContent = '网络错误，请重试';
            loginHint.style.color = '#e74c3c';
          });
      }

      loginBtn.addEventListener('click', doLogin);
      passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      // ===== HTTP 轮询 — 始终运行，2 秒获取最新号码 =====
      function startPolling() {
        stopPolling();
        pollNumber();
        pollTimer = setInterval(pollNumber, 2000);
      }

      function stopPolling() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }

      function pollNumber() {
        fetch('/api/number?queue=' + queueId)
          .then(r => r.json())
          .then(data => {
            curRangeStart = data.range_start || 0;
            curRangeEnd = data.range_end || 0;
            // 有区间时显示区间，无区间时显示单个号码
            if (curRangeStart > 0 && curRangeEnd > 0) {
              adminNumberText.textContent = curRangeStart + '-' + curRangeEnd;
              adminNumberText.style.fontSize = '36px';
            } else {
              adminNumberText.textContent = data.number;
              adminNumberText.style.fontSize = '52px';
            }
            updateTimestamp(data.last_updated);
            updateRangeInfo();
            updateRangeInfo();
            if (wsReady) {
              statusSimple.textContent = '实时连接中';
            } else {
              statusSimple.textContent = '轮询模式';
            }
          })
          .catch(() => { statusSimple.textContent = '获取中...'; });
      }

      // ===== WebSocket — 可选，连上后有实时推送 =====
      function startWebSocket() {
        try { ws.close(); } catch(e) {}
        wsReady = false;

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host + '/ws');

        ws.onopen = () => {
          ws.send(JSON.stringify({ type: 'auth', token: adminToken, queue: queueId }));
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'auth_ok') {
              wsReady = true;
              statusSimple.textContent = '实时连接中';
              curRangeStart = msg.range_start || 0;
              curRangeEnd = msg.range_end || 0;
              updateRangeInfo();
            } else if (msg.type === 'auth_err') {
              wsReady = false;
              // token 失效，静默重新登录
              ws.close();
              reLogin();
            } else if (msg.type === 'number' && msg.queue === queueId) {
              animateAdminNumber(msg.number);
              updateTimestamp(msg.last_updated);
              curRangeStart = msg.range_start || 0;
              curRangeEnd = msg.range_end || 0;
              updateRangeInfo();
              statusSimple.textContent = '实时连接中';
            } else if (msg.type === 'kicked') {
              alert(msg.reason || '控制权已被接管');
              location.reload();
            }
          } catch {}
        };

        ws.onclose = () => {
          wsReady = false;
          statusSimple.textContent = '轮询模式';
          // 5 秒后尝试重连
          setTimeout(() => {
            if (!wsReady) startWebSocket();
          }, 5000);
        };
      }

      function reLogin() {
        if (!savedPassword) {
          localStorage.removeItem(STORAGE_KEY + '_' + queueId);
          location.reload();
          return;
        }
        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: savedPassword, queue: queueId }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              adminToken = data.token;
              saveLogin(data.token, savedPassword);
              startWebSocket();
            } else {
              localStorage.removeItem(STORAGE_KEY + '_' + queueId);
              location.reload();
            }
          })
          .catch(() => {
            setTimeout(reLogin, 3000);
          });
      }

      // ===== UI 辅助 =====
      function updateRangeInfo() {
        if (curRangeStart > 0 && curRangeEnd > 0) {
          rangeInfo.style.display = 'block';
          rangeInfoText.textContent = curRangeStart + ' — ' + curRangeEnd + ' 号';
          rangeStart.placeholder = curRangeStart;
          rangeEnd.placeholder = curRangeEnd;
        } else {
          rangeInfo.style.display = 'none';
        }
      }

      function updateWebButtons(ready) {
        rangeBtn.style.opacity = ready ? '1' : '0.7';
      }

      function updateTimestamp(ts) {
        if (!ts) { updateTimeText.textContent = '暂无记录'; return; }
        const d = new Date(ts * 1000);
        const pad = n => String(n).padStart(2, '0');
        updateTimeText.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      }

      // ===== 核心操作 — 区间叫号 =====
      function sendCmd(cmd) {
        const now = Date.now();
        if (now - lastCmdTime < 300) return;
        lastCmdTime = now;

        fetch('/api/admin/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: adminToken, queue: queueId, type: cmd.type,
                                 range_start: cmd.range_start, range_end: cmd.range_end }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              adminNumberText.textContent = data.range_start + ' — ' + data.range_end;
              updateTimestamp(data.last_updated);
              curRangeStart = data.range_start || 0;
              curRangeEnd = data.range_end || 0;
              updateRangeInfo();
              statusSimple.textContent = '叫号成功';
              setTimeout(() => { statusSimple.textContent = wsReady ? '实时连接中' : '轮询模式'; }, 1000);
            } else if (data.error === '认证失败') {
              reLogin();
            } else {
              statusSimple.textContent = '操作失败，请重试';
            }
          })
          .catch(() => {
            statusSimple.textContent = '网络错误，请重试';
          });
      }

      // 区间叫号按钮
      rangeBtn.addEventListener('click', () => {
        const s = parseInt(rangeStart.value, 10);
        const e = parseInt(rangeEnd.value, 10);
        if (isNaN(s) || isNaN(e) || s < 0 || e < 0 || s > e) {
          alert('请输入有效的区间（起始 ≤ 截止，且均 ≥ 0）');
          return;
        }
        sendCmd({ type: 'range_set', range_start: s, range_end: e });
        rangeStart.value = '';
        rangeEnd.value = '';
      });
      rangeEnd.addEventListener('keydown', e => { if (e.key === 'Enter') rangeBtn.click(); });

      // ===== 页面可见性 =====
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          pollNumber();  // 回到前台立刻刷新
          if (!wsReady) startWebSocket();
        }
      });

      // ===== 启动 =====
      if (!tryRestore()) {
        // 未恢复，显示登录页
        loginOverlay.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
