<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>排队叫号</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container viewer" id="app">
    <header>
      <h1 id="cityName">--</h1>
      <p class="subtitle">请留意屏幕，等待叫号</p>
    </header>

    <main>
      <div class="number-stage">
        <div class="number-display" id="numberDisplay">
          <span class="number-text" id="numberText">--</span>
        </div>
      </div>

      <div class="queue-label" id="queueLabel">--</div>

      <div class="update-time" id="updateTimeBlock">
        <span>最后更新：</span>
        <span id="updateTimeText">--</span>
      </div>

      <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">连接中...</span>
      </div>
    </main>

    <footer>
      <p>请耐心等待 · 注意听叫号</p>
    </footer>
  </div>

  <script>
    (function () {
      const QUEUE_NAMES = { '1': '郑州', '2': '上海', '3': '成都', '4': '广州' };
      const params = new URLSearchParams(location.search);
      let queueId = params.get('queue') || '1';
      if (!QUEUE_NAMES[queueId]) queueId = '1';

      const cityNameEl = document.getElementById('cityName');
      const numberText = document.getElementById('numberText');
      const numberDisplay = document.getElementById('numberDisplay');
      const queueLabel = document.getElementById('queueLabel');
      const updateTimeText = document.getElementById('updateTimeText');
      const statusDot = document.getElementById('statusDot');
      const statusLabel = document.getElementById('statusLabel');

      cityNameEl.textContent = QUEUE_NAMES[queueId];
      queueLabel.textContent = QUEUE_NAMES[queueId];
      document.title = QUEUE_NAMES[queueId] + ' - 排队叫号';

      let lastDisplay = null;
      let staleTimer = null;

      // ===== HTTP 轮询：每 2 秒获取最新号码（主力）=====
      function poll() {
        fetch('/api/number?queue=' + queueId)
          .then(r => r.json())
          .then(data => {
            statusDot.className = 'status-dot connected';
            statusLabel.textContent = '已连接';
            // 主显示叫号区间
            const display = (data.range_start > 0 && data.range_end > 0)
              ? (data.range_start + '-' + data.range_end)
              : String(data.number);
            if (lastDisplay !== display) {
              lastDisplay = display;
              animateDisplay(display);
            }
            updateTimestamp(data.last_updated);
          })
          .catch(() => {
            statusDot.className = 'status-dot disconnected';
            statusLabel.textContent = '获取中...';
          });
      }

      function animateDisplay(text) {
        numberDisplay.classList.add('pulse');
        numberText.style.transform = 'scale(0.2)';
        numberText.style.opacity = '0';
        setTimeout(() => {
          numberText.textContent = text;
          numberText.style.fontSize = text.length > 4 ? '40px' : '64px';
          numberText.style.transform = 'scale(1.2)';
          numberText.style.opacity = '1';
          setTimeout(() => {
            numberText.style.transform = 'scale(1)';
            numberDisplay.classList.remove('pulse');
          }, 180);
        }, 180);
      }

      function updateTimestamp(ts) {
        if (!ts) { updateTimeText.textContent = '暂无记录'; return; }
        const d = new Date(ts * 1000);
        const pad = n => String(n).padStart(2, '0');
        updateTimeText.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        clearTimeout(staleTimer);
        const age = (Date.now() / 1000) - ts;
        const block = document.getElementById('updateTimeBlock');
        if (age > 300) {
          block.classList.add('stale');
        } else {
          block.classList.remove('stale');
          staleTimer = setTimeout(() => {
            if ((Date.now() / 1000) - ts > 300) block.classList.add('stale');
          }, (301 - age) * 1000);
        }
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') poll();
      });

      // 启动
      poll();
      setInterval(poll, 2000);
    })();
  </script>
</body>
</html>
